<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Resultado de la Consulta</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #f5f8fa;
        }

        header {
            background-color: #004aad;
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo-section {
            display: flex;
            align-items: center;
        }

        .logo-section img {
            height: 90px;
            margin-right: 15px;
        }

        header h1 {
            margin: 0;
            font-size: 22px;
        }

        .btn-login {
            background-color: white;
            color: #004aad;
            border: none;
            padding: 8px 14px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        .resultado-container {
            max-width: 700px;
            margin: 60px auto;
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 0 12px rgba(0,0,0,0.1);
        }

        h2 {
            color: #004aad;
            text-align: center;
            margin-bottom: 25px;
        }

        .dato {
            text-align: left;
            margin: 12px 0;
            font-size: 16px;
        }

        .dato strong {
            color: #004aad;
        }

        .btn-primary {
            background-color: #004aad;
            border: none;
            border-radius: 6px;
        }

        .btn-primary:hover {
            background-color: #003a86;
        }

        .btn-secondary {
            background-color: #6c757d;
            border: none;
            border-radius: 6px;
        }

        .text-danger {
            color: #d9534f;
        }
    </style>
</head>

<body>

<!-- Encabezado -->
<header>
    <div class="logo-section">
        <img th:src="@{/images/logo.png}" alt="Logo MASS">
        <h1>Sistema de Autorizaciones Médicas</h1>
    </div>
    <a th:href="@{/login}"><button class="btn-login">Ingreso funcionarios</button></a>
</header>

<!-- Contenedor principal -->
<div class="resultado-container">

    <h2>Resultado de la Consulta</h2>

    <!-- Si la orden existe -->
    <div th:if="${orden != null}">
        <p class="dato"><strong>Número de orden:</strong> <span th:text="${orden.idOrden}"></span></p>
        <p class="dato"><strong>Fecha:</strong> <span th:text="${orden.fecha}"></span></p>
        <p class="dato"><strong>Descripción:</strong> <span th:text="${orden.descripcion}"></span></p>
        <p class="dato"><strong>Estado:</strong> <span th:text="${orden.estado}"></span></p>
        <p class="dato"><strong>Paciente:</strong>
            <span th:text="${orden.paciente.usuario.nombre} + ' ' + ${orden.paciente.usuario.apellido}"></span>
        </p>
        <p class="dato"><strong>Diagnóstico:</strong>
            <span th:text="${orden.historia.diagnostico}"></span>
        </p>

        <div class="text-center mt-4">
            <a th:href="@{/}" class="btn btn-secondary px-4">Volver al inicio</a>
        </div>
    </div>

    <!-- Si no existe -->
    <div th:if="${orden == null}" class="text-center">
        <p class="text-danger fw-bold">No se encontraron datos de la orden.</p>
        <a th:href="@{/}" class="btn btn-primary px-4">Intentar nuevamente</a>
    </div>
</div>

<footer class="container text-center">
    <p>&copy; 2025 MASS – Todos los Derechos reservados &middot;
        <a href="/">Privacidad</a> &middot; <a href="/terminos">Términos</a></p>
</footer>
<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
