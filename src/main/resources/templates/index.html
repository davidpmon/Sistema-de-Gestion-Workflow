<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Consulta de Órdenes Médicas</title>

    <!-- 🔹 Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/styles.css}">

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #f5f8fa;
        }
        header {
            background-color: #004aad;
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        header h1 {
            margin: 0;
            font-size: 22px;
        }
        .btn-login {
            background-color: white;
            color: #004aad;
            border: none;
            padding: 8px 14px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        .container {
            max-width: 500px;
            margin: 60px auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            text-align: center;
        }
        input[type="text"] {
            width: 90%;
            padding: 10px;
            margin-top: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        button {
            margin-top: 15px;
            padding: 10px 20px;
            border: none;
            background-color: #004aad;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        /* 🔹 Modal estilos */
        #modalTerminos {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            opacity: 0;
            transition: opacity 0.4s ease-in-out;
        }
        #modalTerminos.show {
            display: flex;
            opacity: 1;
        }
        #modalTerminos .modal-content {
            background: white;
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            max-width: 600px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }
    </style>
</head>

<body>

<!-- 🔹 Modal de Términos y Condiciones -->
<div id="modalTerminos">
    <div class="modal-content">
        <h4 class="mb-3">Términos y Condiciones de Uso</h4>
        <p class="mb-4">
            Al usar <strong>MASS</strong>, aceptas nuestros
            <a href="/terminos" target="_blank" style="color:#004aad; text-decoration:underline;">
                Términos y Condiciones de servicio
            </a>.
        </p>
        <button id="btnAceptarTerminos" class="btn btn-primary px-4">Aceptar</button>
    </div>
</div>

<header>
    <h1>Sistema de Autorizaciones Médicas</h1>
    <a th:href="@{/login}"><button class="btn-login">Ingreso funcionarios</button></a>
</header>

<div class="container">
    <h2>Consulta de Orden Médica</h2>
    <form th:action="@{/consultar}" method="get">
        <input type="text" name="numeroOrden" placeholder="Ingrese el número de orden" required>
        <button type="submit">Consultar</button>
    </form>
</div>

<!-- 🔹 Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<!-- 🔹 Script funcional -->
<script>
    document.addEventListener("DOMContentLoaded", function () {
        const modal = document.getElementById("modalTerminos");
        const btnAceptar = document.getElementById("btnAceptarTerminos");
        const acepto = localStorage.getItem("aceptoTerminos");

        // Si no ha aceptado, mostrar modal
        if (!acepto) {
            modal.classList.add("show");
        }

        // Al aceptar: guardar y eliminar el modal completamente
        btnAceptar.addEventListener("click", () => {
            localStorage.setItem("aceptoTerminos", "true");
            modal.classList.remove("show");
            setTimeout(() => modal.remove(), 400); // 🔹 Elimina el overlay completamente
        });
    });
</script>

</body>
</html>
