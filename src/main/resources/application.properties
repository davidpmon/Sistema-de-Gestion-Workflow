############################################
# ? CONFIGURACIÓN GENERAL DE LA APLICACIÓN
############################################
spring.application.name=sistema-autorizaciones

# Puerto del servidor (usa variable de entorno PORT si existe)
server.port=${PORT:8080}


############################################
# ?? CONFIGURACIÓN DE BASE DE DATOS MYSQL
############################################
# URL de conexión (usa variable de entorno MYSQL_URL si está definida)
spring.datasource.url=${MYSQL_URL:jdbc:mysql://localhost:3306/autorizaciones_medicas?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Bogota}

# Usuario y contraseńa (variables de entorno para seguridad en AWS)
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD:1234}

# Driver
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


############################################
# ?? CONFIGURACIÓN JPA / HIBERNATE
############################################
# Actualiza automáticamente el esquema de la base de datos
spring.jpa.hibernate.ddl-auto=update

# Muestra las consultas SQL en la consola (útil para desarrollo)
spring.jpa.show-sql=true

# Dialecto para MySQL 8
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# Formato bonito para logs SQL
spring.jpa.properties.hibernate.format_sql=true


############################################
# ? CONFIGURACIÓN DE CODIFICACIÓN Y TIMEZONE
############################################
spring.jpa.properties.hibernate.jdbc.time_zone=America/Bogota
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
