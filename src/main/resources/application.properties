############################################
# ? CONFIGURACI’┐ĮN GENERAL DE LA APLICACI’┐ĮN
############################################
spring.application.name=sgw

# Puerto del servidor (usa variable de entorno PORT si existe)
server.port=${PORT:8080}


############################################
# ?? CONFIGURACION DE BASE DE DATOS MYSQL
############################################
# URL de conexion (usa variable de entorno MYSQL_URL si est’┐Į definida)
spring.datasource.url=${MYSQL_URL:jdbc:mysql://localhost:3306/sgw?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Bogota}

# Usuario y contrasenia (variables de entorno para seguridad en AWS)
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD:1234}

# Driver
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


############################################
# ?? CONFIGURACI’┐ĮN JPA / HIBERNATE
############################################
# Actualiza autom’┐Įticamente el esquema de la base de datos
spring.jpa.hibernate.ddl-auto=update

# Muestra las consultas SQL en la consola
spring.jpa.show-sql=true


# Formato bonito para logs SQL
spring.jpa.properties.hibernate.format_sql=true


############################################
# ? CONFIGURACION DE CODIFICACION Y TIMEZONE
############################################
spring.jpa.properties.hibernate.jdbc.time_zone=America/Bogota
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
